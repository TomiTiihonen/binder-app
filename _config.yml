title: "Binder - Journal & Notes"
description: "Your all-in-one personal journal for iPhone. Capture voice memos, notes, lists, photos, locations, events and more — all in one place."
url: "https://binderapp.info"
baseurl: ""

app_store_url: "https://apps.apple.com/app/id6759610184"
support_email: "support@binderapp.info"
github_username: TomiTiihonen

author:
  name: "Tomi Tiihonen"

logo: /assets/images/app-icon.png

# Default social share image — used by jekyll-seo-tag for og:image / twitter:image
# when a page doesn't declare its own. Target size: 1200×630.
image: /assets/images/og-default.png

# Set `twitter.username: your_handle` once you have one — jekyll-seo-tag will then
# emit proper twitter:site / twitter:creator tags. Leaving it unset is cleaner
# than emitting `@` as a handle.
# twitter:
#   username: binderapp
#   card: summary_large_image

social:
  name: Binder
  links:
    - https://binderapp.info

markdown: kramdown
permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  help:
    output: true
    permalink: /help/:path/
  news:
    output: true
    permalink: /news/:path/
  blog:
    output: true
    permalink: /blog/:path/

defaults:
  - scope:
      path: ""
      type: "help"
    values:
      layout: "article"
      section: "help"
  - scope:
      path: ""
      type: "news"
    values:
      layout: "article"
      section: "news"
  - scope:
      path: ""
      type: "blog"
    values:
      layout: "article"
      section: "blog"
